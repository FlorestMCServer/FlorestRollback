# Настройки базы данных SQLite
database:
  file-name: "database.db"
  # Режим WAL позволяет читать и писать в базу одновременно без фризов
  wal-mode: true

# Настройки логирования
logging:
  # Удалять логи старше X дней (чтобы диск не взорвался)
  purge-after-days: 30
  # Максимальный размер очереди в памяти перед принудительной записью
  max-queue-size: 500000

# Настройки команд по умолчанию
rollback:
  default-radius: 5
  default-time: "1h"

# Сообщения (можно будет потом перевести на любой язык)
messages:
  prefix: "§b§lFlorestRollback §8» "
  no-permission: "§cУ вас нет прав на это действие!"
  reload: "§aКонфигурация успешно перезагружена."